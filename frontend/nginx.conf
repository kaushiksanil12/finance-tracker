server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA fallback routing
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend internally
    location /api/ {
        proxy_pass http://finance_backend:3000/api/;
    }
}
